<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Products Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Beauty Logo" class="logo">
        <h1>Beauty Products Online</h1>
        <p>Your one-stop shop for beauty and skincare</p>
    </header>

    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#products">Products</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="products">
        <h2>Our Products</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="images/product1.jpg" alt="Product 1">
                <h3>Moisturizing Cream</h3>
                <p>Price: $15</p>
                <button>Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="images/product2.jpg" alt="Product 2">
                <h3>Lipstick Set</h3>
                <p>Price: $25</p>
                <button>Add to Cart</button>
            </div>
            <!-- Add more products similarly -->
        </div>
    </section>

    <section id="contact">
        <h2>Contact Us</h2>
        <p>Email: support@beautyproducts.com</p>
        <p>Phone: +1234567890</p>
    </section>

    <footer>
        <p>&copy; 2026 Beauty Products Online. All rights reserved.</p>
    </footer>
</body>
</html>
